# Encoders (Uncomment these two lines to add support to your firmware)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow (Uncomment these two lines to add support to your firmware)
# RGB quickly drains battery power
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# ── Bluetooth robustness ──────────────────────────────────────────────────────

# Boost TX power for better range / fewer dropped connections
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fix a known ZMK bug where reconnecting after sleep shows "incorrect passkey"
# or gets stuck on "connecting" because the host re-uses stale GATT subscriptions
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Allow the central (left) to fetch the peripheral's battery level over BLE
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Prefer BLE output by default; fall back to USB when cable is connected
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Keep more Bluetooth bonds stored (default is 5; increase if pairing many devices)
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_MAX_CONN=5
